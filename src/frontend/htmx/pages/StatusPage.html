<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>AbsoluteVitals · Status</title>
		<meta name="description" content="Public system status" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/assets/ico/favicon.ico" />
		<script src="https://cdn.tailwindcss.com"></script>
		<script src="/htmx/htmx.min.js"></script>
	</head>
	<body class="bg-slate-100 min-h-screen">
		<header class="bg-white border-b border-slate-200">
			<div
				class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between"
			>
				<div>
					<h1 class="text-xl font-bold text-slate-900">AbsoluteVitals</h1>
					<p class="text-xs text-slate-500">Public status</p>
				</div>
				<nav class="flex items-center gap-4 text-sm">
					<a class="text-slate-700 hover:text-slate-900" href="/dashboard">
						Dashboard
					</a>
					<a class="text-slate-700 hover:text-slate-900" href="/status">
						Status
					</a>
				</nav>
			</div>
		</header>

		<main class="max-w-3xl mx-auto px-6 py-12 space-y-6">
			<section>
				<h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide">
					Current Status
				</h2>
				<div
					id="status"
					class="mt-3"
					hx-get="/api/status/fragment"
					hx-trigger="load, every 15s"
					hx-include="#projectId"
					hx-swap="innerHTML"
				>
					<div class="flex items-center gap-3 bg-slate-200 text-slate-600 p-4 rounded-lg">
						<span class="h-3 w-3 rounded-full bg-slate-400"></span>
						<span class="font-semibold tracking-wide">CHECKING…</span>
					</div>
				</div>
			</section>

			<section
				class="bg-white border border-slate-200 rounded-lg p-4 text-sm text-slate-600"
			>
				<label class="block">
					<span class="font-medium text-slate-700">Project ID</span>
					<input
						id="projectId"
						name="projectId"
						type="text"
						placeholder="paste a project UUID"
						class="mt-1 w-full border border-slate-300 rounded px-3 py-2 font-mono text-xs"
						hx-get="/api/status/fragment"
						hx-trigger="input changed delay:400ms"
						hx-target="#status"
						hx-swap="innerHTML"
					/>
				</label>
				<p class="mt-2 text-xs text-slate-500">
					Polling refreshes every 15 seconds. Operational =
					<code>ok rate ≥ 95%</code> over the last 15 min.
				</p>
			</section>

			<footer class="text-center text-xs text-slate-400 pt-6">
				powered by AbsoluteJS · Elysia · HTMX
			</footer>
		</main>
	</body>
</html>
