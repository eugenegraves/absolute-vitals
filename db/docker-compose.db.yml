services:
    db:
        image: postgres:15
        restart: always
        environment:
            POSTGRES_DB: database
            POSTGRES_PASSWORD: password
            POSTGRES_USER: user
        ports:
            - "5433:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U user -h localhost --quiet"]
            interval: 2s
            timeout: 5s
            retries: 30
            start_period: 5s
        volumes:
            - db_data:/var/lib/postgresql/data

volumes:
    db_data:
